<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dual Translate</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #dbeafe;
      --bg: #ffffff;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --success: #10b981;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      font-size: 14px;
      line-height: 1.5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .header .subtitle {
      font-size: 11px;
      opacity: 0.85;
    }
    .content {
      padding: 12px 16px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .row + .row {
      border-top: 1px solid var(--border);
    }
    .label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .value {
      font-size: 13px;
      font-weight: 500;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 24px;
      transition: 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background: var(--primary);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: white;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: 0.15s;
    }
    .btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    .btn-group {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }
    .btn-group .btn {
      flex: 1;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-badge.active {
      background: #dbeafe;
      color: #1d4ed8;
    }
    .status-badge.inactive {
      background: #f3f4f6;
      color: #6b7280;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.active { background: #2563eb; }
    .status-dot.inactive { background: #9ca3af; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .lang-select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      background: white;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Dual Translate</h1>
      <div class="subtitle">Bilingual Translation</div>
    </div>
  </div>
  <div class="content" id="app">
    <div class="loading" id="loading">Loading...</div>
    <div id="mainContent" style="display:none">
      <div class="row">
        <span class="label">Translation</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="status-badge inactive" id="statusBadge">
            <span class="status-dot inactive" id="statusDot"></span>
            <span id="statusText">Off</span>
          </span>
          <label class="toggle">
            <input type="checkbox" id="toggleTranslate">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="row">
        <span class="label">Source Language</span>
        <select class="lang-select" id="sourceLang">
          <option value="auto">Auto detect</option>
        </select>
      </div>
      <div class="row">
        <span class="label">Target Language</span>
        <select class="lang-select" id="targetLang"></select>
      </div>
      <div class="row">
        <span class="label">Mode</span>
        <select class="lang-select" id="translationMode">
          <option value="dual">Bilingual</option>
          <option value="translation">Translation only</option>
          <option value="original">Original only</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn" id="translatePage">Translate Page</button>
        <button class="btn" id="showOriginal">Show Original</button>
      </div>
      <div class="btn-group">
        <button class="btn" id="openSettings">Settings</button>
      </div>
    </div>
  </div>
  <div class="footer">
    <span style="color:var(--text-secondary);font-size:11px">Powered by Google Translate</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
